<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0e5c46">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CourtNotes">
<title>CourtNotes — Tennis Coaching Companion</title>
<style>
:root{
  --bg:#f4f5f1;
  --card:#ffffff;
  --ink:#17241e;
  --ink-soft:#5b6a62;
  --line:#e3e7e0;
  --green:#0e5c46;
  --green-soft:#e3efe9;
  --clay:#d95d39;
  --clay-soft:#fbe9e2;
  --blue:#2b6cb0;
  --blue-soft:#e4eef8;
  --gold:#b98a1c;
  --gold-soft:#faf1da;
  --radius:14px;
  --shadow:0 1px 3px rgba(23,36,30,.08),0 4px 14px rgba(23,36,30,.06);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);font-size:16px;line-height:1.45;
  padding-top:var(--safe-top);
}
button{font:inherit;border:none;background:none;color:inherit;cursor:pointer}
input,textarea,select{font:inherit;color:inherit}
h1,h2,h3,h4{line-height:1.2;font-weight:700}
#app{max-width:680px;margin:0 auto;padding:14px 14px calc(90px + var(--safe-bottom));min-height:100%}

/* ---------- top bar ---------- */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.topbar .back{width:38px;height:38px;border-radius:50%;background:var(--card);box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;font-size:19px;flex:none}
.topbar h1{font-size:21px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar .sub{font-size:13px;color:var(--ink-soft);font-weight:400}
.brand{display:flex;align-items:center;gap:10px;margin:4px 0 16px}
.brand .logo{width:42px;height:42px;border-radius:12px;background:var(--green);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--shadow)}
.brand h1{font-size:24px}
.brand .tag{font-size:13px;color:var(--ink-soft)}

/* ---------- cards & lists ---------- */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.card.tappable:active{transform:scale(.985)}
.section-title{font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);
  font-weight:700;margin:18px 2px 8px}
.empty{color:var(--ink-soft);text-align:center;padding:26px 10px;font-size:15px}
.row{display:flex;align-items:center;gap:12px}
.row .grow{flex:1;min-width:0}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--green-soft);color:var(--green);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;flex:none}
.client-name{font-weight:700;font-size:17px}
.meta{font-size:13px;color:var(--ink-soft)}
.chev{color:#b9c2bb;font-size:20px;flex:none}

/* ---------- client header & collapsibles ---------- */
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.namewrap{display:flex;align-items:center;gap:7px;min-width:0}
.namewrap h1{font-size:19px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.infobtn{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--ink-soft);color:var(--ink-soft);
  font-size:12.5px;font-weight:700;font-style:italic;font-family:Georgia,serif;flex:none;
  display:flex;align-items:center;justify-content:center}
.actioncluster{display:flex;gap:8px;flex:none}
.actioncluster .act{display:flex;flex-direction:column;align-items:center;gap:2px;width:44px}
.actioncluster .act .ic{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:17px;box-shadow:var(--shadow)}
.actioncluster .act span{font-size:9.5px;font-weight:700;color:var(--ink-soft);letter-spacing:.02em}
.thinbar{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:11px;
  box-shadow:var(--shadow);padding:8px 12px;margin-bottom:9px;width:100%;text-align:left}
.thinbar .t{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--green);flex:none}
.thinbar .sum{flex:1;font-size:12.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.thinbar .chv{flex:none;color:#b9c2bb;font-size:13px;transition:transform .18s}
.thinbar .chv.open{transform:rotate(90deg)}
.expandcard{margin-top:-3px;margin-bottom:9px;border-top-left-radius:4px;border-top-right-radius:4px}
.goals-ul{margin:0 0 0 18px;font-size:14.5px}
.goals-ul li{margin:3px 0}
.focusrow{display:flex;gap:6px;overflow-x:auto;flex:1;min-width:0;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding:1px 0}
.focusrow::-webkit-scrollbar{display:none}
.focusrow .chip{flex:none;padding:3.5px 9px;font-size:11.5px;font-weight:700}

/* ---------- chips ---------- */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:6px 12px;border-radius:999px;background:var(--bg);border:1.5px solid var(--line);
  font-size:13.5px;font-weight:600;color:var(--ink-soft)}
.chip.on{background:var(--green);border-color:var(--green);color:#fff}
.chip.tag{background:var(--green-soft);border-color:transparent;color:var(--green);padding:3px 10px;font-size:12.5px}
.chip.tag.clay{background:var(--clay-soft);color:var(--clay)}
.chip.tag.blue{background:var(--blue-soft);color:var(--blue)}
.chip.tag.gold{background:var(--gold-soft);color:var(--gold)}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;
  padding:12px 18px;font-weight:700;font-size:15.5px;background:var(--green);color:#fff;
  box-shadow:var(--shadow);width:100%}
.btn:active{opacity:.85}
.btn.secondary{background:var(--card);color:var(--green);border:1.5px solid var(--line)}
.btn.clay{background:var(--clay)}
.btn.small{width:auto;padding:8px 14px;font-size:14px;border-radius:10px}
.btn.ghost{background:none;box-shadow:none;color:var(--green);padding:8px 10px;width:auto}
.btn.danger-ghost{background:none;box-shadow:none;color:#b23b3b;padding:8px 10px;width:auto;font-size:14px}
.btnrow{display:flex;gap:9px;margin-top:10px}
.btnrow .btn{flex:1}
.fab{position:fixed;right:18px;bottom:calc(20px + var(--safe-bottom));width:58px;height:58px;border-radius:50%;
  background:var(--clay);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(217,93,57,.4);z-index:40}

/* ---------- forms ---------- */
label.f{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin:14px 2px 5px;
  text-transform:uppercase;letter-spacing:.05em}
input.f,textarea.f,select.f{width:100%;padding:11px 12px;border-radius:11px;border:1.5px solid var(--line);
  background:var(--card);font-size:16px}
textarea.f{min-height:84px;resize:vertical}
input.f:focus,textarea.f:focus{outline:none;border-color:var(--green)}

/* ---------- session timeline ---------- */
.sess{border-left:4px solid var(--green);}
.sess.planned{border-left-color:var(--gold)}
.sess .date{font-weight:700;font-size:15px}
.sess .status{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.sess .status.done{color:var(--green)}
.sess .status.planned{color:var(--gold)}
.sess .preview{font-size:14px;color:var(--ink-soft);margin-top:6px;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sess .chips{margin-top:8px}

/* ---------- session editor sections ---------- */
.seg{display:flex;background:var(--card);border-radius:12px;padding:4px;box-shadow:var(--shadow);margin-bottom:14px}
.seg button{flex:1;padding:9px 4px;border-radius:9px;font-weight:700;font-size:14px;color:var(--ink-soft)}
.seg button.on{background:var(--green);color:#fff}
.notebox{position:relative}
.notebox h3{font-size:15px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
.notebox h3 .dot{width:9px;height:9px;border-radius:50%;flex:none}
.hint{font-size:13px;color:var(--ink-soft);margin:6px 2px}

/* ---------- dictation ---------- */
.micwrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:8px 0 4px}
.micbtn{width:74px;height:74px;border-radius:50%;background:var(--clay);color:#fff;font-size:32px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(217,93,57,.35);position:relative}
.micbtn.rec{background:#b23b3b;animation:pulse 1.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(178,59,59,.45)}70%{box-shadow:0 0 0 18px rgba(178,59,59,0)}100%{box-shadow:0 0 0 0 rgba(178,59,59,0)}}
.micstate{font-size:13.5px;font-weight:600;color:var(--ink-soft);text-align:center}
.interim{color:var(--ink-soft);font-style:italic}

/* ---------- drills ---------- */
.drill{border:1.5px solid var(--line);border-radius:12px;padding:11px 12px;margin-top:9px;background:#fdfdfc}
.drill .dname{font-weight:700;font-size:15px}
.drill .ddesc{font-size:13.5px;color:var(--ink-soft);margin-top:3px}
.drill .dfoot{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
.lvl{font-size:11.5px;font-weight:800;padding:2px 8px;border-radius:6px;background:var(--blue-soft);color:var(--blue)}
.phase-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--clay);margin-top:14px}

/* ---------- court editor ---------- */
#courtOverlay{position:fixed;inset:0;background:#10231c;z-index:100;display:flex;flex-direction:column;
  padding-top:var(--safe-top)}
#courtOverlay .cbar{display:flex;align-items:center;gap:8px;padding:10px 12px;color:#fff}
#courtOverlay .cbar h2{font-size:16px;flex:1;font-weight:600}
#courtOverlay .cbar button{font-weight:700;padding:8px 12px;border-radius:9px;font-size:14px}
#courtOverlay .cbar .save{background:var(--clay);color:#fff}
#courtOverlay .cbar .cancel{color:#cfd8d2}
.courtwrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;padding:6px;position:relative}
#courtSVG{width:100%;height:100%;touch-action:none}
.zoomctl{position:absolute;right:12px;top:12px;display:flex;flex-direction:column;gap:8px}
.zoomctl button{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.16);color:#fff;
  font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.zoomhint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);color:#9fb3a9;font-size:12px;
  background:rgba(0,0,0,.35);padding:5px 12px;border-radius:999px;pointer-events:none;white-space:nowrap}
.toolbar{display:flex;gap:6px;padding:10px 10px calc(12px + var(--safe-bottom));overflow-x:auto;background:#0c1b15}
.tool{flex:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:#9fb3a9;font-size:11px;
  font-weight:600;padding:7px 10px;border-radius:10px;min-width:58px}
.tool svg{width:26px;height:26px}
.tool.on{background:rgba(255,255,255,.14);color:#fff}
.court-thumb{border:1.5px solid var(--line);border-radius:10px;overflow:hidden;margin-top:9px;background:#3a7ca5}
.court-thumb svg{display:block;width:100%;height:auto}
.court-thumb .cap{background:var(--card);padding:7px 10px;font-size:13.5px;font-weight:600;display:flex;align-items:center}
.court-thumb .cap span{flex:1}

/* ---------- share view ---------- */
.share-doc{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 18px}
.share-doc h2{font-size:20px;margin-bottom:2px}
.share-doc .sd-sub{color:var(--ink-soft);font-size:13.5px;margin-bottom:14px}
.share-sess{border-top:1.5px solid var(--line);padding:14px 0}
.share-sess h3{font-size:16px}
.share-sess h4{font-size:13px;text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px;color:var(--green)}
.share-sess h4.clay{color:var(--clay)}
.share-sess h4.blue{color:var(--blue)}
.share-sess ul{margin:2px 0 2px 20px;font-size:14.5px}
.share-sess li{margin-bottom:3px}

/* ---------- dialog ---------- */
#dialogRoot{position:fixed;inset:0;z-index:130;display:none;align-items:flex-end;justify-content:center;
  background:rgba(16,30,24,.45)}
#dialogRoot.open{display:flex}
.sheet{background:var(--card);width:100%;max-width:680px;border-radius:20px 20px 0 0;
  padding:18px 16px calc(20px + var(--safe-bottom));max-height:88vh;overflow-y:auto}
.sheet h2{font-size:19px;margin-bottom:4px}
.grabber{width:40px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 14px}

.progress-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.stat{background:var(--bg);border-radius:11px;padding:10px 12px}
.stat .n{font-size:22px;font-weight:800;color:var(--green)}
.stat .l{font-size:12.5px;color:var(--ink-soft);font-weight:600}
.bar{height:7px;border-radius:4px;background:var(--line);overflow:hidden;margin-top:5px}
.bar i{display:block;height:100%;background:var(--green);border-radius:4px}

.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + var(--safe-bottom));
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:14px;font-weight:600;
  z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

@media print{
  body{background:#fff;padding:0}
  #app{padding:0;max-width:none}
  .no-print,.fab,.topbar .back{display:none !important}
  .share-doc{box-shadow:none;border-radius:0}
}
</style>
</head>
<body>
<div id="app">
  <noscript><div style="padding:40px 20px;text-align:center;font-family:sans-serif">
    <h2>&#127934; CourtNotes</h2>
    <p style="margin-top:10px">This app needs JavaScript to run.<br>
    If you're seeing this in a file preview, open the file in <b>Safari or Chrome</b> instead.</p>
  </div></noscript>
</div>
<div id="dialogRoot"></div>
<div id="courtOverlayRoot"></div>
<div class="toast" id="toast"></div>
<script>
"use strict";
/* ============================================================
   CourtNotes — single-file tennis coaching companion
   ============================================================ */

/* ---------- safe storage (falls back to memory if blocked) ---------- */
const store = (() => {
  let mem = {};
  let ok = false;
  try {
    localStorage.setItem("__cn_test", "1");
    localStorage.removeItem("__cn_test");
    ok = true;
  } catch (e) { ok = false; }
  return {
    persistent: ok,
    get(k){ try { return ok ? localStorage.getItem(k) : (mem[k] ?? null); } catch(e){ return mem[k] ?? null; } },
    set(k,v){ try { if (ok) localStorage.setItem(k,v); else mem[k]=v; } catch(e){ mem[k]=v; } }
  };
})();

/* ---------- state ---------- */
const DB_KEY = "courtnotes_v1";
let db = loadDB();
function loadDB(){
  try {
    const raw = store.get(DB_KEY);
    if (raw) { const d = JSON.parse(raw); if (d && d.clients){ if (!d.myDrills) d.myDrills = []; return d; } }
  } catch(e){}
  return { clients: [], sessions: [], myDrills: [] };
}
/* one unified notes list (with migration from the old 3-bucket format) */
function notesItems(s){
  if (!s.notes) return [];
  if (Array.isArray(s.notes.items)) return s.notes.items;
  const merged = [...(s.notes.highlights||[]), ...(s.notes.technical||[]), ...(s.notes.next||[])];
  s.notes.items = merged;
  return merged;
}
function save(){ store.set(DB_KEY, JSON.stringify(db)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 2200);
}
function fmtDate(iso){
  if (!iso) return "";
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString(undefined, {weekday:"short", month:"short", day:"numeric", year:"numeric"});
}
function todayISO(){
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

/* ---------- constants ---------- */
const SHOTS = ["Forehand","Backhand","Serve","Return","Volley","Overhead","Slice","Drop shot","Lob","Approach shot"];
const PRINCIPLES = ["Preparation","Contact point","Footwork","Spacing","Recovery","Weight transfer","Topspin","Consistency","Depth","Placement","Point patterns","Net play"];

/* ============================================================
   ROUTER
   ============================================================ */
const app = document.getElementById("app");
let route = { view: "home" };
function go(view, params = {}){
  route = { view, ...params };
  window.scrollTo(0,0);
  render();
}
function render(){
  stopDictation(true);
  if (route.view === "home") renderHome();
  else if (route.view === "client") renderClient(route.clientId);
  else if (route.view === "session") renderSession(route.sessionId);
  else if (route.view === "share") renderShare(route.clientId);
  else renderHome();
}

/* ============================================================
   HOME — client folders
   ============================================================ */
function renderHome(){
  const clients = [...db.clients].sort((a,b)=>a.name.localeCompare(b.name));
  let html = `
    <div class="brand">
      <div class="logo">&#127934;</div>
      <div><h1>CourtNotes</h1><div class="tag">Your coaching companion</div></div>
    </div>`;
  if (!store.persistent) {
    html += `<div class="card" style="background:var(--gold-soft);font-size:13.5px">
      &#9888;&#65039; Preview mode — data won't be saved here. Open this file in Safari or Chrome (and add it to your home screen) for full saving.</div>`;
  }
  html += `<div class="section-title">Clients (${clients.length})</div>`;
  if (!clients.length){
    html += `<div class="card"><div class="empty">No clients yet.<br>Tap <b>+</b> to add your first client folder.</div></div>`;
  }
  for (const c of clients){
    const sess = clientSessions(c.id);
    const done = sess.filter(s=>s.status==="done");
    const planned = sess.filter(s=>s.status==="planned");
    const last = done[0];
    let sub = last ? "Last session " + fmtDate(last.date) : "No sessions yet";
    if (planned.length) sub += " · " + planned.length + " planned";
    html += `
    <div class="card tappable row" onclick="go('client',{clientId:'${c.id}'})">
      ${avatarHTML(c, 44)}
      <div class="grow">
        <div class="client-name">${esc(c.name)}</div>
        <div class="meta">${esc(sub)}</div>
        ${c.focus && c.focus.length ? `<div class="chips" style="margin-top:6px">${c.focus.slice(0,3).map(f=>`<span class="chip tag">${esc(f)}</span>`).join("")}</div>` : ""}
      </div>
      <div class="chev">&#8250;</div>
    </div>`;
  }
  html += `
    <div class="section-title">Data</div>
    <div class="btnrow no-print">
      <button class="btn secondary" onclick="exportData()">&#11015;&#65039; Back up</button>
      <button class="btn secondary" onclick="importData()">&#11014;&#65039; Restore</button>
    </div>
    <button class="fab" onclick="openClientDialog()" aria-label="Add client">+</button>`;
  app.innerHTML = html;
}
function initials(name){
  return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase() || "?";
}
function avatarHTML(c, size){
  const s = size ? `style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.38)}px"` : "";
  return `<div class="avatar" ${s}>${c.photo ? `<img src="${c.photo}" alt="">` : esc(initials(c.name))}</div>`;
}
const ABBR = {"Forehand":"FH","Backhand":"BH","Serve":"SRV","Return":"RET","Volley":"VLY","Overhead":"OH",
  "Slice":"SL","Drop shot":"DROP","Lob":"LOB","Approach shot":"APP","Preparation":"PREP","Contact point":"CP",
  "Footwork":"FW","Spacing":"SPC","Recovery":"REC","Weight transfer":"WT","Topspin":"TS","Consistency":"CONS",
  "Depth":"DEP","Placement":"PLC","Point patterns":"PTRN","Net play":"NET"};
function abbr(t){ return ABBR[t] || t; }
function goalLines(c){ return (c.goals||"").split("\n").map(x=>x.trim()).filter(Boolean); }
const uiCollapse = { goals:true, stats:true };
function toggleUI(key){ uiCollapse[key] = !uiCollapse[key]; renderClient(route.clientId); }
function clientSessions(clientId){
  return db.sessions.filter(s=>s.clientId===clientId)
    .sort((a,b)=> (b.date||"").localeCompare(a.date||""));
}

/* ============================================================
   CLIENT DIALOG (add / edit)
   ============================================================ */
let _cdPhoto = null;
function openClientDialog(clientId){
  const c = clientId ? db.clients.find(x=>x.id===clientId) : null;
  const focus = c ? [...(c.focus||[])] : [];
  _cdPhoto = c ? (c.photo||null) : null;
  openSheet(`
    <h2>${c ? "Edit client" : "New client"}</h2>
    <div class="row" style="margin-top:12px">

function renderClient(clientId){

  if (!c) return go("home");
  const sess = clientSessions(clientId);
  const planned = sess.filter(s=>s.status==="planned");
  const done = sess.filter(s=>s.status==="done");
  const goals = goalLines(c);
  const focusShots = (c.focus||[]).filter(f=>SHOTS.includes(f));

  /* header: back | avatar | name + info | action cluster */
  let html = `
    <div class="topbar" style="align-items:center">
      <button class="back" onclick="go('home')">&#8249;</button>
      ${avatarHTML(c, 38)}
      <div class="grow" style="min-width:0">
        <div class="namewrap">
          <h1>${esc(c.name)}</h1>
          <button class="infobtn" onclick="openClientInfo('${c.id}')">i</button>
        </div>
        ${c.level?`<div class="sub" style="font-size:12.5px;color:var(--ink-soft)">${esc(c.level)}</div>`:""}
      </div>
      <div class="actioncluster no-print">

        <button class="act" onclick="newSession('${c.id}','done')"><span class="ic" style="background:var(--green);color:#fff">&#127934;</span><span>Log</span></button>
        <button class="act" onclick="go('share',{clientId:'${c.id}'})"><span class="ic" style="background:var(--card);color:var(--green)">&#128228;</span><span>Share</span></button>
      </div>
    </div>`;

  /* goals: thin collapsible bar */
  if (goals.length){
    const sum = focusShots.length ? focusShots.map(abbr).join(" · ") : goals[0];
    html += `<button class="thinbar" onclick="toggleUI('goals')">
      <span class="t">Goals</span>
      <span class="sum">${uiCollapse.goals ? esc(sum) : ""}</span>
      <span class="chv ${uiCollapse.goals?"":"open"}">&#9654;</span>
    </button>`;
    if (!uiCollapse.goals)
      html += `<div class="card expandcard"><ul class="goals-ul">${goals.map(g=>`<li>${esc(g)}</li>`).join("")}</ul></div>`;
  }

  /* focus: one thin swipeable row of acronym chips */
  if (c.focus && c.focus.length){
    html += `<div class="thinbar" style="padding:7px 12px">
      <span class="t">Focus</span>
      <div class="focusrow">${c.focus.map(f=>`<span class="chip tag" title="${esc(f)}" onclick="toast('${esc(f)}')">${esc(abbr(f))}</span>`).join("")}</div>
    </div>`;
  }

  if (planned.length){
    html += `<div class="section-title">Upcoming / planned</div>`;
    for (const s of planned) html += sessionCard(s);
  }
  html += `<div class="section-title">Session history</div>`;
  if (!done.length) html += `<div class="card"><div class="empty">No completed sessions yet.</div></div>`;
  for (const s of done) html += sessionCard(s);

  /* stats: collapsible, lives at the very bottom */
  html += statsHTML(done);

  app.innerHTML = html;
}
function statsHTML(done){
  if (!done.length) return "";
  const shotCount = {};
  for (const s of done) for (const sh of (s.shots||[])) shotCount[sh]=(shotCount[sh]||0)+1;
  const top = Object.entries(shotCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  if (!top.length) return "";
  const max = top[0][1];
  let html = `<div class="section-title">Stats</div>
    <button class="thinbar" onclick="toggleUI('stats')">
      <span class="t">Sessions per shot</span>
      <span class="sum">${uiCollapse.stats ? esc(top.slice(0,3).map(([s,n])=>abbr(s)+" "+n).join(" · ")) : ""}</span>
      <span class="chv ${uiCollapse.stats?"":"open"}">&#9654;</span>
    </button>`;
  if (!uiCollapse.stats){
    html += `<div class="card expandcard">`;
    for (const [shot,n] of top){
      html += `<div style="margin-top:7px"><div class="row" style="justify-content:space-between"><span style="font-size:13.5px;font-weight:600">${esc(shot)}</span><span class="meta">${n} session${n>1?"s":""}</span></div><div class="bar"><i style="width:${Math.round(n/max*100)}%"></i></div></div>`;
    }
    html += `</div>`;
  }
  return html;
}
function sessionCard(s){
  const shots = (s.shots||[]).slice(0,3);
  let preview = "";
  if (s.status==="done"){
    preview = notesItems(s)[0] || s.transcript || s.objective || "";
  } else {
    preview = s.objective || (s.plan && s.plan.length ? s.plan[0].name : "");
  }
  return `
  <div class="card tappable sess ${s.status==="planned"?"planned":""}" onclick="go('session',{sessionId:'${s.id}'})">
    <div class="row" style="justify-content:space-between">
      <span class="date">${fmtDate(s.date)}</span>
      <span class="status ${s.status==="done"?"done":"planned"}">${s.status==="done"?"Completed":"Planned"}</span>
    </div>
    ${preview?`<div class="preview">${esc(preview)}</div>`:""}
    <div class="chips">
      ${shots.map(x=>`<span class="chip tag clay">${esc(x)}</span>`).join("")}
      ${(s.principles||[]).slice(0,2).map(x=>`<span class="chip tag blue">${esc(x)}</span>`).join("")}
      ${(s.diagrams&&s.diagrams.length)?`<span class="chip tag gold">&#128506;&#65039; ${s.diagrams.length} diagram${s.diagrams.length>1?"s":""}</span>`:""}
    </div>
  </div>`;
}

/* ---------- dictation engine ---------- */
let recog = null, recogActive = false;
function wireReviewTab(s){
  const btn = document.getElementById("micBtn");
  if (!btn) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR){ btn.style.opacity=.4; btn.onclick=()=>toast("Dictation not supported here — use keyboard mic"); return; }
  btn.onclick = ()=> recogActive ? stopDictation() : startDictation(s.id);
}
function startDictation(sessId){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recog = new SR();
  recog.continuous = true;
  recog.interimResults = true;
  recog.lang = navigator.language || "en-US";
  const box = document.getElementById("transcriptBox");
  const interim = document.getElementById("interimLine");
  recog.onresult = (ev)=>{
    let interimText = "";
    for (let i=ev.resultIndex; i<ev.results.length; i++){
      const r = ev.results[i];
      if (r.isFinal){
        let text = r[0].transcript.trim();
        if (text){
          text = text[0].toUpperCase()+text.slice(1);
          if (!/[.!?]$/.test(text)) text += ".";
          box.value = (box.value ? box.value.replace(/\s+$/,"")+" " : "") + text;
          updSess(sessId,"transcript",box.value);
        }
      } else interimText += r[0].transcript;
    }
    if (interim) interim.textContent = interimText;
  };
  recog.onerror = (e)=>{
    if (e.error==="not-allowed") { toast("Microphone access was blocked"); stopDictation(); }
  };
  recog.onend = ()=>{
    if (recogActive && recog) { try { recog.start(); } catch(e){} } // auto-restart (some browsers stop after silence)
  };
  try { recog.start(); } catch(e){ toast("Couldn't start the mic"); return; }
  recogActive = true;
  const btn = document.getElementById("micBtn");
  if (btn){ btn.classList.add("rec"); btn.innerHTML = "&#9632;"; }
  const st = document.getElementById("micState");
  if (st) st.innerHTML = "Listening… tap to stop.";
}
function stopDictation(silent){
  recogActive = false;
  if (recog){ try { recog.onend=null; recog.stop(); } catch(e){} recog = null; }
  if (silent) return;
  const btn = document.getElementById("micBtn");
  if (btn){ btn.classList.remove("rec"); btn.innerHTML = "&#127908;"; }

}

/* ---------- transcript → structured notes ---------- */
const NEXT_RE = /next (time|session|lesson|week)|going forward|homework|work on next|practice at home|before next|for next|keep working on|needs? (more )?(work|reps|practice)|focus (on )?next|still (struggl|needs)|continue (to|with)/i;
const TECH_RE = /grip|swing|backswing|follow.?through|contact point|contact|racquet|racket|toss|stance|split.?step|footwork|foot work|elbow|wrist|shoulder|hip|knee|rotation|preparation|prep\b|take.?back|spin|topspin|slice|unit turn|weight transfer|balance|spacing|recovery|recover|low to high|open stance|closed stance|lag|pronation|extension|finish|drill|feed|mid.?court|inside|outside/i;
const WIN_RE = /great|good|improv|progress|nail(ed)?|breakthrough|well done|much better|really solid|clicked|consistent(ly)? (hit|made)|success|won|impressive|cleaner|big step|proud|finally/i;
/* concept detection → bullet headings */
const CONCEPTS = [
  [/recover(y|ing)?\b/i,"Recovery"], [/contact point|contact\b/i,"Contact point"],
  [/follow.?through/i,"Follow-through"], [/\btoss\b/i,"Toss"], [/split.?step/i,"Split-step"],
  [/footwork|foot work|spacing|adjustment steps/i,"Footwork"],
  [/preparation|prep\b|take.?back|backswing|unit turn/i,"Preparation"],
  [/topspin|brush/i,"Topspin"], [/\bslice\b/i,"Slice"],
  [/crosscourt|cross court/i,"Crosscourt"], [/down the line/i,"Down the line"],
  [/inside.?out|inside forehand|outside forehand/i,"Inside/outside FH"],
  [/pattern/i,"Patterns"], [/depth|deep ball/i,"Depth"], [/consisten/i,"Consistency"],
  [/weight transfer|balance/i,"Balance"], [/volley|net play/i,"Net play"],
  [/overhead|smash/i,"Overhead"], [/serv(e|ing)/i,"Serve"], [/return/i,"Return"],
  [/backhand|back hand/i,"Backhand"], [/forehand|fore hand/i,"Forehand"],
  [/movement|moving|court coverage/i,"Movement"]
];
const DANGLING_RE = /\b(a|an|the|of|with|on|to|and|or|for|in|at|by|into|where|that|was|were|is|are|his|her|their|my|one)$/i;
function splitSentences(text){
  const raw = (text.replace(/\n+/g," ").match(/[^.!?]+[.!?]*/g) || [])
    .map(s=>s.replace(/[.!?]+$/,"").trim()).filter(Boolean);
  const out = [];
  for (const s of raw){
    const prev = out.length ? out[out.length-1] : null;
    // speech-to-text sprinkles periods mid-thought: merge fragments back together
    if (prev && (DANGLING_RE.test(prev) || s.split(/\s+/).length < 4))
      out[out.length-1] = prev + " " + s;
    else out.push(s);
  }
  return out;
}
function clauseSplit(sent){
  if (sent.split(/\s+/).length <= 14) return [sent];
  const parts = sent.split(/\s+(?:and then|and also|and|where|followed by|so|then|while|after that|plus)\s+/i)
    .map(x=>x.trim()).filter(Boolean);
  const out = [];
  for (const p of parts){
    if (out.length && p.split(/\s+/).length < 3) out[out.length-1] += " and " + p;
    else out.push(p);
  }
  return out.length ? out : [sent];
}
function condense(sent){
  let t = sent;
  for (let i=0;i<3;i++) t = t.replace(/^\s*(ok(ay)?|so|and|but|then|well|um|uh|all ?right|alright|now|yeah|also)[,\s]+/i,"");
  t = t.replace(/^\s*(next (time|session|lesson|week)[,\s]*)?(we should|we will|we'll|we're going to|let's|i want to|i'd like to|going to|gonna)\s+/i,"");
  t = t.replace(/^\s*(keep|continue)\s+(working on|building|practicing)\s+/i,"");
  t = t.replace(/^\s*(worked on|working on|work on|focused on|trying to|tried to)\s+/i,"");
  t = t.replace(/^\s*(we|she|he|they|i|you)('re|'ve)?\s+(also\s+)?(started( out)?( with)?|worked on|were working on|was working on|did( some)?|do( some)?|focused on|spent( some)? time on|moved on to|went (to|into)|tried|kept|continued( with)?|hit)\s*/i,"");
  t = t.replace(/^\s*(there was|there were|we had|we ran|it was|that was)\s*/i,"");
  t = t.replace(/\b(kind of|sort of|a little bit of a|a little bit|a little|you know|i think|i mean|basically|actually|really|just|pretty much|obviously|trying to|going to)\b/gi," ");
  t = t.replace(/\s{2,}/g," ").trim().replace(/^(a|an|the|some|her|his)\s+/i,"");
  const words = t.split(/\s+/);
  if (words.length > 12) t = words.slice(0,12).join(" ") + "…";
  t = t.charAt(0).toUpperCase() + t.slice(1);
  return t;
}
function toBullet(sent){
  const phrase = condense(sent);
  if (!phrase) return null;
  for (const [re,label] of CONCEPTS){
    if (re.test(sent)){
      if (phrase.toLowerCase().startsWith(label.toLowerCase())) return phrase;
      return label + " — " + phrase.charAt(0).toLowerCase() + phrase.slice(1);
    }
  }
  return phrase;
}
function organizeNotes(sessId){
  const s = db.sessions.find(x=>x.id===sessId); if(!s) return;
  const text = (s.transcript||"").trim();
  if (!text){ toast("Nothing to organize yet — dictate or type first"); return; }
  const items = notesItems(s);
  const existing = new Set(items);
  for (const sent of splitSentences(text)){
    const isNext = NEXT_RE.test(sent);
    for (const clause of clauseSplit(sent)){
      let bullet = toBullet(clause);
      if (!bullet || bullet.split(/\s+/).length < 2) continue;
      if (isNext) bullet = "Next: " + bullet.charAt(0).toLowerCase() + bullet.slice(1);
      if (!existing.has(bullet)){ items.push(bullet); existing.add(bullet); }
    }
  }
  s.notes = { items };
  save(); renderSession(sessId); toast("Session notes cleaned up — edit below");
}

/* ============================================================
   LESSON PLAN SUGGESTION ENGINE
   ============================================================ */
function clientLevelForShot(clientId, shot){
  const n = db.sessions.filter(s=>s.clientId===clientId && s.status==="done" && (s.shots||[]).includes(shot)).length;
  return n >= 4 ? 3 : n >= 2 ? 2 : 1;
}
function suggestPlan(sessId){
  const s = db.sessions.find(x=>x.id===sessId); if(!s) return;
  if (!s.shots.length && !s.principles.length){
    toast("Select at least one shot or principle first"); return;
  }
  const usedBefore = new Set();
  for (const past of db.sessions.filter(x=>x.clientId===s.clientId && x.id!==s.id))
    for (const d of (past.plan||[])) usedBefore.add(d.name);

  const targetLevel = s.shots.length
    ? Math.round(s.shots.reduce((a,sh)=>a+clientLevelForShot(s.clientId,sh),0)/s.shots.length)
    : 2;

  function score(d){
    let sc = 0;
    sc += (d.shots||[]).filter(x=>s.shots.includes(x)).length * 3;
    sc += (d.principles||[]).filter(x=>s.principles.includes(x)).length * 2;
    if (sc === 0) return -1;                    // must relate to the focus
    sc -= Math.abs((d.level||1) - targetLevel) * 1.5;  // right difficulty
    if (!usedBefore.has(d.name)) sc += 1.25;    // freshness
    else sc += 0.25;                            // familiar is ok, slight nod to variety
    return sc;
  }
  // include your own library drills as suggestion candidates (default: main work)
  const libCandidates = db.myDrills.map(d=>({
    name: d.name, desc: d.desc, phase: "main", level: 2,
    shots: (d.tags||[]).filter(t=>SHOTS.includes(t)),
    principles: (d.tags||[]).filter(t=>PRINCIPLES.includes(t)),
    elements: d.elements, mine: true
  }));
  const ALL = DRILLS.concat(libCandidates);
  function pick(phase, n, fallbackLoose){
    let pool = ALL.filter(d=>d.phase===phase).map(d=>({d, sc:score(d)}))
      .filter(x=>x.sc>=0).sort((a,b)=>b.sc-a.sc);
    if (!pool.length && fallbackLoose)
      pool = ALL.filter(d=>d.phase===phase).map(d=>({d, sc:2-Math.abs((d.level||1)-targetLevel)}))
        .sort((a,b)=>b.sc-a.sc);
    return pool.slice(0,n).map(x=>x.d);
  }
  const warm = pick("warmup", 2, true);
  const main = pick("main", 3, false);
  const game = pick("game", 1, true);

  const plan = [];
  const phaseName = {warmup:"Warm-up", main:"Main work", game:"Game-based finisher"};
  for (const arr of [warm, main, game])
    for (const d of arr)
      plan.push({ name:d.name, desc:d.desc, coaching:d.coaching, level:d.level,
        phase: phaseName[d.phase], elements: d.elements ? JSON.parse(JSON.stringify(d.elements)) : undefined,
        tags:(d.shots||[]).filter(x=>s.shots.includes(x)).concat((d.principles||[]).filter(x=>s.principles.includes(x))).slice(0,3) });

  // pull forward last session's next steps into the objective if empty
  if (!s.objective){
    const lastDone = db.sessions.filter(x=>x.clientId===s.clientId && x.status==="done" && x.id!==s.id)
      .sort((a,b)=>(b.date||"").localeCompare(a.date||""))[0];
    if (lastDone){
      const items = notesItems(lastDone);
      const nexts = items.filter(x=>/^next:/i.test(x)).map(x=>x.replace(/^next:\s*/i,""));
      const src = nexts.length ? nexts : items;
      if (src.length) s.objective = "Build on last session: " + src.slice(0,2).join("; ");
    }
  }
  s.plan = plan;
  save(); renderSession(sessId);
  toast(main.length ? "Plan suggested — tweak as needed" : "Added what I could — try selecting different focus areas");
}

const CW = 1000, CH = 560;               // viewBox
const CX0 = 110, CX1 = 890, CY0 = 100, CY1 = 460;  // doubles court bounds
function courtBaseSVG(){
  const sy0 = CY0+45, sy1 = CY1-45;      // singles sidelines
  const svl = 290, svr = 710, mid = 280; // service lines & center
  return `
  <rect x="0" y="0" width="${CW}" height="${CH}" fill="#2e6e55"/>
  <rect x="${CX0}" y="${CY0}" width="${CX1-CX0}" height="${CY1-CY0}" fill="#3a7ca5"/>
  <g stroke="#ffffff" stroke-width="4" fill="none">
    <rect x="${CX0}" y="${CY0}" width="${CX1-CX0}" height="${CY1-CY0}"/>
    <line x1="${CX0}" y1="${sy0}" x2="${CX1}" y2="${sy0}"/>
    <line x1="${CX0}" y1="${sy1}" x2="${CX1}" y2="${sy1}"/>
    <line x1="${svl}" y1="${sy0}" x2="${svl}" y2="${sy1}"/>
    <line x1="${svr}" y1="${sy0}" x2="${svr}" y2="${sy1}"/>
    <line x1="${svl}" y1="${mid}" x2="${svr}" y2="${mid}"/>
    <line x1="${CX0}" y1="${mid-7}" x2="${CX0+14}" y2="${mid-7}" stroke-width="3" transform="translate(0,7)"/>
    <line x1="${CX1-14}" y1="${mid}" x2="${CX1}" y2="${mid}" stroke-width="3"/>
  </g>
  <line x1="500" y1="${CY0-18}" x2="500" y2="${CY1+18}" stroke="#1c2f28" stroke-width="7"/>
  <line x1="500" y1="${CY0-18}" x2="500" y2="${CY1+18}" stroke="#e8e8e8" stroke-width="3" stroke-dasharray="7 6"/>`;
}
function movePts(el){
  return el.pts || [{x:el.x1,y:el.y1},{x:el.x2,y:el.y2}];
}
function smoothPathD(pts){
  if (pts.length < 3) return `M${pts[0].x},${pts[0].y} L${pts[pts.length-1].x},${pts[pts.length-1].y}`;
  let d = `M${pts[0].x},${pts[0].y}`;
  for (let i=1; i<pts.length-1; i++){
    const mx = (pts[i].x+pts[i+1].x)/2, my = (pts[i].y+pts[i+1].y)/2;
    d += ` Q${pts[i].x},${pts[i].y} ${mx},${my}`;
  }
  const last = pts[pts.length-1];
  return d + ` L${last.x},${last.y}`;
}
function arrowHead(x2,y2,ang,color){
  const ah = 16;
  const ax1 = x2 - ah*Math.cos(ang - .45), ay1 = y2 - ah*Math.sin(ang - .45);
  const ax2 = x2 - ah*Math.cos(ang + .45), ay2 = y2 - ah*Math.sin(ang + .45);
  return `<polyline points="${ax1},${ay1} ${x2},${y2} ${ax2},${ay2}" stroke="${color}" stroke-width="6" fill="none" stroke-linecap="round"/>`;
}
function elementSVG(el){
  if (el.t==="ball"){
    const ang = Math.atan2(el.y2-el.y1, el.x2-el.x1);
    return `<g stroke="#ffd23e" stroke-width="6" fill="none" stroke-linecap="round">
      <line x1="${el.x1}" y1="${el.y1}" x2="${el.x2}" y2="${el.y2}"/>
      ${arrowHead(el.x2, el.y2, ang, "#ffd23e")}</g>`;
  }
  if (el.t==="move"){
    const pts = movePts(el);
    const a = pts[pts.length-2] || pts[0], b = pts[pts.length-1];
    const ang = Math.atan2(b.y-a.y, b.x-a.x);
    return `<g fill="none" stroke-linecap="round">
      <path d="${smoothPathD(pts)}" stroke="#ffffff" stroke-width="6" stroke-dasharray="12 9"/>
      ${arrowHead(b.x, b.y, ang, "#ffffff")}</g>`;
  }
  if (el.t==="num" || el.t==="numb")   // ball-order number (yellow, matches ball path)
    return `<g><circle cx="${el.x}" cy="${el.y}" r="17" fill="#ffd23e" stroke="#8a6d00" stroke-width="3"/><text x="${el.x}" y="${el.y+6.5}" text-anchor="middle" font-size="19" font-weight="800" fill="#5c4800" font-family="inherit">${el.n||1}</text></g>`;
  if (el.t==="nump")                   // player-order number (white, matches player run)
    return `<g><circle cx="${el.x}" cy="${el.y}" r="17" fill="#ffffff" stroke="#2b6cb0" stroke-width="3.5"/><text x="${el.x}" y="${el.y+6.5}" text-anchor="middle" font-size="19" font-weight="800" fill="#2b6cb0" font-family="inherit">${el.n||1}</text></g>`;
  if (el.t==="balldot")
    return `<g><circle cx="${el.x}" cy="${el.y}" r="13" fill="#d9e94f" stroke="#96a821" stroke-width="2"/>
      <path d="M${el.x-11},${el.y-7} Q${el.x-2},${el.y} ${el.x-11},${el.y+7} M${el.x+11},${el.y-7} Q${el.x+2},${el.y} ${el.x+11},${el.y+7}" stroke="#ffffff" stroke-width="2.2" fill="none"/></g>`;
  if (el.t==="cone")
    return `<g><polygon points="${el.x},${el.y-16} ${el.x-13},${el.y+11} ${el.x+13},${el.y+11}" fill="#ff8a3c" stroke="#c85a14" stroke-width="2.5"/><polygon points="${el.x},${el.y-6} ${el.x-7},${el.y+6} ${el.x+7},${el.y+6}" fill="#ffd9bd"/></g>`;
  if (el.t==="target")
    return `<g><circle cx="${el.x}" cy="${el.y}" r="24" fill="#ffffff" opacity=".9"/><circle cx="${el.x}" cy="${el.y}" r="16" fill="#e34d4d"/><circle cx="${el.x}" cy="${el.y}" r="7" fill="#ffffff"/></g>`;
  if (el.t==="player" || el.t==="coach"){
    const isP = el.t==="player";
    return `<g><circle cx="${el.x}" cy="${el.y}" r="20" fill="${isP?"#1d4ed8":"#17241e"}" stroke="#ffffff" stroke-width="3"/><text x="${el.x}" y="${el.y+6}" text-anchor="middle" font-size="19" font-weight="800" fill="#ffffff" font-family="inherit">${isP?"P":"C"}</text></g>`;
  }
  return "";
}
function diagramSVG(elements, extra){
  return `<svg viewBox="0 0 ${CW} ${CH}" xmlns="http://www.w3.org/2000/svg" ${extra||""}>
    ${courtBaseSVG()}<g id="els">${(elements||[]).map(elementSVG).join("")}</g><g id="preview"></g></svg>`;
}

  });
  html += `<button class="btn" style="margin-top:12px" onclick="openCourtEditor('${s.id}',-1)">&#9999;&#65039; New diagram</button></div>`;
  return html;
}

function closeCourtEditor(){ courtRoot.innerHTML=""; ce=null; }
function ceRedraw(){
  const g = document.querySelector("#courtSVG #els");
  if (g) g.innerHTML = ce.elements.map(elementSVG).join("");
}
function ceUndo(){ if (ce && ce.elements.length){ ce.elements.pop(); ceRedraw(); } }
function svgPoint(svg, ev){
  const pt = svg.createSVGPoint();
  pt.x = ev.clientX; pt.y = ev.clientY;
  const p = pt.matrixTransform(svg.getScreenCTM().inverse());
  return { x: Math.max(0,Math.min(CW,p.x)), y: Math.max(0,Math.min(CH,p.y)) };
}
/* ---------- zoom & pan (viewBox based) ---------- */
function ceApplyVB(){
  const svg = document.getElementById("courtSVG");
  if (svg) svg.setAttribute("viewBox", `${ce.vb.x} ${ce.vb.y} ${ce.vb.w} ${ce.vb.h}`);
}
function ceClampVB(){
  ce.vb.w = Math.max(CW/5, Math.min(CW, ce.vb.w));
  ce.vb.h = ce.vb.w * CH/CW;
  ce.vb.x = Math.max(0, Math.min(CW - ce.vb.w, ce.vb.x));
  ce.vb.y = Math.max(0, Math.min(CH - ce.vb.h, ce.vb.y));
}
function ceZoomAt(ax, ay, factor){
  const newW = Math.max(CW/5, Math.min(CW, ce.vb.w * factor));
  const r = newW / ce.vb.w;
  ce.vb.x = ax - (ax - ce.vb.x) * r;
  ce.vb.y = ay - (ay - ce.vb.y) * r;
  ce.vb.w = newW;
  ceClampVB(); ceApplyVB();
}
function ceZoom(factor){ ceZoomAt(ce.vb.x + ce.vb.w/2, ce.vb.y + ce.vb.h/2, factor); }
function ceZoomReset(){ ce.vb = {x:0,y:0,w:CW,h:CH}; ceApplyVB(); }

function wireCourtPointer(){
  const svg = document.getElementById("courtSVG");
  const preview = ()=>document.querySelector("#courtSVG #preview");
  const pointers = new Map();
  let gesture = null, pinchPrev = null;
  const MARKERS = ["cone","target","player","coach","numb","nump","balldot"];

  svg.addEventListener("pointerdown", ev=>{
    ev.preventDefault();
    svg.setPointerCapture(ev.pointerId);
    pointers.set(ev.pointerId, {x:ev.clientX, y:ev.clientY});
    if (pointers.size === 1){
      const p = svgPoint(svg, ev);
      gesture = { pts:[p], client0:{x:ev.clientX,y:ev.clientY}, moved:false, pinched:false };
    } else if (pointers.size === 2){
      if (gesture) gesture.pinched = true;
      pinchPrev = null;
      const pv = preview(); if (pv) pv.innerHTML = "";
      const hint = document.getElementById("zoomHint"); if (hint) hint.style.display = "none";
    }
  });

  svg.addEventListener("pointermove", ev=>{
    if (!pointers.has(ev.pointerId)) return;
    pointers.set(ev.pointerId, {x:ev.clientX, y:ev.clientY});
    if (pointers.size >= 2){ doPinch(); return; }
    if (!gesture || gesture.pinched) return;
    const p = svgPoint(svg, ev);
    if (Math.hypot(ev.clientX-gesture.client0.x, ev.clientY-gesture.client0.y) > 8) gesture.moved = true;
    if (ce.tool === "ball"){
      preview().innerHTML = elementSVG({ t:"ball", x1:gesture.pts[0].x, y1:gesture.pts[0].y, x2:p.x, y2:p.y });
    } else if (ce.tool === "move"){
      const last = gesture.pts[gesture.pts.length-1];
      if (Math.hypot(p.x-last.x, p.y-last.y) > 10 && gesture.pts.length < 80) gesture.pts.push(p);
      preview().innerHTML = elementSVG({ t:"move", pts: gesture.pts.concat([p]) });
    }
  });

  function doPinch(){
    const [a,b] = [...pointers.values()];
    const mid = { x:(a.x+b.x)/2, y:(a.y+b.y)/2 };
    const dist = Math.max(20, Math.hypot(a.x-b.x, a.y-b.y));
    if (pinchPrev){
      const ctm = svg.getScreenCTM();
      // pan by midpoint movement
      ce.vb.x -= (mid.x - pinchPrev.mid.x) / ctm.a;
      ce.vb.y -= (mid.y - pinchPrev.mid.y) / ctm.d;
      ceClampVB(); ceApplyVB();
      // zoom about midpoint
      const anchor = svgPoint(svg, { clientX: mid.x, clientY: mid.y });
      ceZoomAt(anchor.x, anchor.y, pinchPrev.dist / dist);
    }
    pinchPrev = { mid, dist };
  }

  const finish = ev=>{
    const hadPointer = pointers.has(ev.pointerId);
    pointers.delete(ev.pointerId);
    if (pointers.size < 2) pinchPrev = null;
    if (!hadPointer || !gesture) return;
    if (pointers.size === 0){
      const g = gesture; gesture = null;
      const pv = preview(); if (pv) pv.innerHTML = "";
      if (g.pinched) return;                      // was a zoom gesture, not a drawing
      const p = svgPoint(svg, ev);
      if (ce.tool === "erase"){ ceErase(p); return; }
      if (MARKERS.includes(ce.tool)){
        if (!g.moved){
          const el = { t: ce.tool, x:p.x, y:p.y };
          if (ce.tool === "numb") el.n = ce.elements.filter(e=>e.t==="numb"||e.t==="num").length + 1;
          if (ce.tool === "nump") el.n = ce.elements.filter(e=>e.t==="nump").length + 1;
          ce.elements.push(el); ceRedraw();
        }
        return;
      }
      if (ce.tool === "ball"){
        if (Math.hypot(p.x-g.pts[0].x, p.y-g.pts[0].y) > 18){
          ce.elements.push({ t:"ball", x1:g.pts[0].x, y1:g.pts[0].y, x2:p.x, y2:p.y }); ceRedraw();
        }
        return;
      }
      if (ce.tool === "move"){
        const pts = g.pts.concat([p]);
        let len = 0;
        for (let i=1;i<pts.length;i++) len += Math.hypot(pts[i].x-pts[i-1].x, pts[i].y-pts[i-1].y);
        if (len > 18){ ce.elements.push({ t:"move", pts }); ceRedraw(); }
      }
    }
  };
  svg.addEventListener("pointerup", finish);
  svg.addEventListener("pointercancel", ev=>{
    pointers.delete(ev.pointerId);
    if (pointers.size < 2) pinchPrev = null;
    if (pointers.size === 0){ gesture = null; const pv = preview(); if (pv) pv.innerHTML = ""; }
  });
}
function ceErase(p){
  let best = -1, bestD = 46;
  ce.elements.forEach((el,i)=>{
    let d;
    if (el.t==="ball") d = distToSegment(p, {x1:el.x1,y1:el.y1,x2:el.x2,y2:el.y2});
    else if (el.t==="move"){
      const pts = movePts(el); d = Infinity;
      for (let j=1;j<pts.length;j++)
        d = Math.min(d, distToSegment(p, {x1:pts[j-1].x,y1:pts[j-1].y,x2:pts[j].x,y2:pts[j].y}));
    }
    else d = Math.hypot(p.x-el.x, p.y-el.y);
    if (d < bestD){ bestD = d; best = i; }
  });
  if (best>=0){
    const removed = ce.elements.splice(best,1)[0];
    if (["num","numb"].includes(removed.t)) ce.elements.filter(e=>e.t==="numb"||e.t==="num").forEach((e,idx)=>e.n=idx+1);
    if (removed.t==="nump") ce.elements.filter(e=>e.t==="nump").forEach((e,idx)=>e.n=idx+1);
    ceRedraw();
  }
}
function distToSegment(p, el){
  const vx = el.x2-el.x1, vy = el.y2-el.y1;
  const len2 = vx*vx+vy*vy || 1;
  let t = ((p.x-el.x1)*vx + (p.y-el.y1)*vy)/len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(p.x-(el.x1+t*vx), p.y-(el.y1+t*vy));
}
/* ---------- diagram interpreter (on-device geometric analysis) ---------- */
function interpretDiagram(elements){
  const balls = elements.filter(e=>e.t==="ball");
  const runs = elements.filter(e=>e.t==="move");
  const cones = elements.filter(e=>e.t==="cone").length;
  const targets = elements.filter(e=>e.t==="target").length;
  const coach = elements.find(e=>e.t==="coach");
  const player = elements.find(e=>e.t==="player");
  const ballNums = elements.filter(e=>e.t==="numb"||e.t==="num").length;
  const NET = 500, MID = 280;
  const tags = new Set(); const bits = [];

  const feeds = balls.filter(b => coach && Math.hypot(b.x1-coach.x, b.y1-coach.y) < 110);
  let serves = 0, volleys = 0, cross = 0, dtl = 0, deep = 0, short = 0;
  for (const b of balls){
    const fromLeft = b.x1 < NET;
    const oppBase = fromLeft ? CX1 : CX0, ownBase = fromLeft ? CX0 : CX1;
    const oppServ = fromLeft ? 710 : 290;
    const crossesNet = (b.x1-NET)*(b.x2-NET) < 0;
    if (Math.abs(b.x1-ownBase) < 50 && Math.abs(b.y1-MID) < 100 && crossesNet
        && Math.abs(b.x2-NET) < 230 && Math.abs(b.x2-oppServ) < 240){ serves++; continue; }
    if (Math.abs(b.x1-NET) < 160){ volleys++; }
    if (crossesNet){
      if ((b.y1-MID)*(b.y2-MID) < 0 && Math.abs(b.y2-b.y1) > 70) cross++;
      else if (Math.abs(b.y2-b.y1) < 70 && Math.abs(b.y1-MID) > 60) dtl++;
      if (Math.abs(b.x2-oppBase) < 130) deep++;
      else if (Math.abs(b.x2-NET) < 200) short++;
    }
  }
  let approach = false, recovery = false, lateral = false;
  for (const r of runs){
    const pts = movePts(r); const a = pts[0], z = pts[pts.length-1];
    if (Math.abs(z.x-NET) < 230 && Math.abs(a.x-NET) > 280) approach = true;
    if (Math.hypot(z.x-a.x, z.y-a.y) < 130 && pts.length > 3) recovery = true;
    if (Math.abs(z.y-a.y) > 160 && Math.abs(z.x-a.x) < 180) lateral = true;
  }
  // tags
  if (serves) tags.add("Serve");
  if (volleys) { tags.add("Volley"); tags.add("Net play"); }
  if (approach) { tags.add("Approach shot"); tags.add("Net play"); }
  if (cross || dtl) tags.add("Placement");
  if (cones + targets > 0) tags.add("Placement");
  if (deep >= 2) tags.add("Depth");
  if (runs.length) tags.add("Footwork");
  if (recovery || lateral) tags.add("Recovery");
  if (balls.length >= 2 && ballNums >= 2) tags.add("Point patterns");
  if (feeds.length >= 3) tags.add("Consistency");
  // name
  const n = ballNums || balls.length;
  let name = "Custom drill";
  if (serves) name = "Serve placement drill";
  else if (approach) name = "Approach & net drill";
  else if (feeds.length >= 2) name = n + "-ball feeding pattern";
  else if (cross && dtl) name = "Crosscourt / down-the-line pattern";
  else if (cross) name = "Crosscourt pattern";
  else if (dtl) name = "Down-the-line pattern";
  else if (volleys) name = "Net exchange drill";
  // goal sentence
  if (feeds.length) bits.push(`coach feeds ${n>1 ? n+" balls" : "the ball"}${deep ? " deep" : ""}${cross&&dtl ? " to alternating corners" : cross ? " crosscourt" : dtl ? " down the line" : ""}`);
  else if (serves) bits.push("serve to the marked zone" + (targets ? "s" : ""));
  else if (balls.length) bits.push(`hit ${n>1 ? n+" shots" : "the shot"}${cross ? " crosscourt" : dtl ? " down the line" : ""}${deep ? " landing deep" : ""}`);
  if (lateral) bits.push("player covers the baseline side to side");
  if (approach) bits.push("player closes in to the net");
  if (recovery) bits.push("recover to home base after each shot");
  if (targets || cones) bits.push(`aim for the ${targets ? "target" + (targets>1?"s":"") : "cone" + (cones>1?"s":"")}`);
  let goal = bits.length ? bits.join("; ") : "run the pattern as drawn";
  goal = goal.charAt(0).toUpperCase() + goal.slice(1) + ".";
  return { name, goal, tags: [...tags] };
}

/* ---------- save sheet: title, goal, tags, add-to-library ---------- */
function saveCourtDiagram(){
  if (!ce) return;
  ce.title = document.getElementById("ce_title").value.trim();
  const d = ce;
  const tagSel = new Set(d.tags || []);
  openSheet(`
    <h2>Save diagram</h2>
    <label class="f">Drill name</label>
    <input class="f" id="ds_title" value="${esc(d.title)}" placeholder="e.g. 6-ball warmup">
    <button class="btn secondary" style="margin-top:12px" onclick="runInterpret()">&#129302; Interpret diagram &#8594; fill name, goal &amp; tags</button>
    <div class="hint">Reads your arrows, markers and numbers and drafts the details — everything stays editable.</div>
    <label class="f">Goal / description</label>
    <textarea class="f" id="ds_goal" placeholder="What this drill trains…">${esc(d.goal||"")}</textarea>
    <label class="f">Tags</label>
    <div class="chips" id="ds_tags">${SHOTS.concat(PRINCIPLES).map(t=>
      `<button class="chip ${tagSel.has(t)?"on":""}" data-v="${esc(t)}">${esc(t)}</button>`).join("")}</div>
    <label class="f" style="display:flex;align-items:center;gap:9px;text-transform:none;font-size:15px;letter-spacing:0">
      <input type="checkbox" id="ds_lib" style="width:19px;height:19px" ${d.idx<0?"checked":""}>
      Add to my drill library (reusable in lesson plans)
    </label>
    <div class="btnrow"><button class="btn" onclick="finalizeDiagram()">Save diagram</button></div>
  `);
  document.querySelectorAll("#ds_tags .chip").forEach(ch=>{ ch.onclick = ()=> ch.classList.toggle("on"); });
}
function runInterpret(){
  const r = interpretDiagram(ce.elements);
  const titleEl = document.getElementById("ds_title");
  if (!titleEl.value.trim()) titleEl.value = r.name;
  document.getElementById("ds_goal").value = r.goal;
  document.querySelectorAll("#ds_tags .chip").forEach(ch=>{
    ch.classList.toggle("on", r.tags.includes(ch.dataset.v));
  });
  toast("Interpreted — adjust anything that's off");
}
function finalizeDiagram(){
  const s = db.sessions.find(x=>x.id===ce.sessId); if(!s){ closeSheet(); closeCourtEditor(); return; }
  const title = document.getElementById("ds_title").value.trim();
  const goal = document.getElementById("ds_goal").value.trim();
  const tags = [...document.querySelectorAll("#ds_tags .chip.on")].map(x=>x.dataset.v);
  const toLib = document.getElementById("ds_lib").checked;
  const diagram = { title, goal, tags, elements: ce.elements };
  if (ce.idx>=0) s.diagrams[ce.idx] = diagram; else s.diagrams.push(diagram);
  if (toLib){
    const existing = db.myDrills.find(x=>x.name===title);
    const lib = { id: existing ? existing.id : uid(), name: title || "Untitled drill",
      desc: goal, tags, elements: JSON.parse(JSON.stringify(ce.elements)) };
    if (existing) Object.assign(existing, lib); else db.myDrills.push(lib);
  }
  save();
  const sessId = ce.sessId;
  closeSheet(); closeCourtEditor();
  sessTab = "court";
  renderSession(sessId);
  toast(toLib ? "Saved — added to your drill library" : "Diagram saved");
}

      b += `<h4>Lesson plan</h4><ul>${s.plan.map(d=>`<li><b>${esc(d.name)}</b>${d.desc?" — "+esc(d.desc):""}</li>`).join("")}</ul>`;
      for (const d of s.plan) if (d.elements)
        b += `<div class="court-thumb" style="margin-top:8px">${diagramSVG(d.elements)}<div class="cap"><span>${esc(d.name)}</span></div></div>`;
    }
    const items = notesItems(s);
    if (items.length) b += `<h4>Session notes</h4><ul>${items.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`;
    for (const d of (s.diagrams||[])){
      b += `<div class="court-thumb" style="margin-top:10px">${diagramSVG(d.elements)}${(d.title||d.goal)?`<div class="cap" style="display:block"><span style="display:block">${esc(d.title||"")}</span>${d.goal?`<span style="display:block;font-weight:400;color:var(--ink-soft);font-size:12.5px">${esc(d.goal)}</span>`:""}</div>`:""}</div>`;
    }
    return b + `</div>`;
  };
  for (const s of planned) html += sessBlock(s);
  for (const s of done) html += sessBlock(s);
  if (!sess.length) html += `<div class="empty">No sessions recorded yet.</div>`;
  html += `</div>`;
  app.innerHTML = html;
}
function summaryText(clientId){
  const c = db.clients.find(x=>x.id===clientId); if(!c) return "";
  const lines = [`${c.name} — Training summary`, ""];
  if (c.goals) lines.push("Goals: " + c.goals, "");
  for (const s of clientSessions(clientId)){
    lines.push(`■ ${fmtDate(s.date)} (${s.status==="done"?"completed":"planned"})`);
    if (s.shots.length) lines.push("  Focus: " + s.shots.concat(s.principles).join(", "));
    if (s.objective) lines.push("  Objective: " + s.objective);
    if (s.plan.length) lines.push("  Plan: " + s.plan.map(d=>d.name).join(" → "));
    const items = notesItems(s);
    if (items.length) lines.push("  Notes: " + items.join(" · "));
    lines.push("");
  }
  return lines.join("\n");
}
async function shareText(clientId){
  const text = summaryText(clientId);
  const c = db.clients.find(x=>x.id===clientId);
  if (navigator.share){
    try { await navigator.share({ title: (c?c.name:"Client") + " — Training summary", text }); return; } catch(e){ if (e.name==="AbortError") return; }
  }
  try { await navigator.clipboard.writeText(text); toast("Summary copied to clipboard"); }
  catch(e){ toast("Couldn't share on this browser — use Print / PDF"); }
}

/* ============================================================
   BACKUP / RESTORE
   ============================================================ */
function exportData(){
  const blob = new Blob([JSON.stringify(db, null, 1)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "courtnotes-backup-" + todayISO() + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
  toast("Backup downloaded");
}
function importData(){
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "application/json,.json";
  inp.onchange = ()=>{
    const f = inp.files[0]; if(!f) return;
    const rd = new FileReader();
    rd.onload = ()=>{
      try {
        const d = JSON.parse(rd.result);
        if (!d || !Array.isArray(d.clients) || !Array.isArray(d.sessions)) throw 0;
        if (!confirm(`Restore backup with ${d.clients.length} client(s) and ${d.sessions.length} session(s)? This replaces current data.`)) return;
        db = d; save(); render(); toast("Backup restored");
      } catch(e){ toast("That file doesn't look like a CourtNotes backup"); }
    };
    rd.readAsText(f);
  };
  inp.click();
}

/* ============================================================
   INIT
   ============================================================ */
render();

</script>
